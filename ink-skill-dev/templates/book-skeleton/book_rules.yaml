# book_rules.yaml —— 单本书的硬约束和写作配置

length:
  target: 4500           # 单章目标字数
  softMinPct: 0.90       # softMin = target × 0.90 = 4050
  softMaxPct: 1.15       # softMax = target × 1.15 = 5175
  hardMinPct: 0.80       # hardMin = target × 0.80 = 3600
  hardMaxPct: 1.30       # hardMax = target × 1.30 = 5850
  countingMode: chinese  # chinese / english
  enforceSoftMin: true
  enforceHardMin: true

hardRules:
  noMarkdownInProse: true       # 禁止正文出现 markdown 结构化标记（---, ##, **, ``` 等）
  noAnalysisTerms: true         # 禁止"显然 / 明显"等分析术语
  noAIMarkerWords: true         # 禁止"忽然 / 突然"等 AI 标记词（详见写作规则）
  banEmDash: true               # 禁用破折号 ——
  banContrastiveBuTing: true    # 禁用"不是 X 而是 Y"句式

pipeline:
  autoRunAudit: true            # Step 7 审计默认必跑
  autoRunVerify: true           # Step 12 三层验证默认必跑
  autoExpandIfShort: true       # 字数在 softMin-hardMin 间默认扩写一次
